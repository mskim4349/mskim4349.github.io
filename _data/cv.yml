  summary: >
    Postdoctoral researcher at UNIST working at the boundary between
    computational solid mechanics and machine learning. Research focuses on
    neural-network constitutive modeling, indentation-based parameter
    identification, damage and fracture in cryogenic environments, and
    graph-neural-network surrogates for multi-physics simulation.

